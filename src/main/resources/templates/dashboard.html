<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - RoommateFinder</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="/dashboard" class="nav-brand">Roommate<span class="accent-dot">Finder</span></a>
        <div class="nav-links" id="navLinks">
            <span id="userName" style="color:var(--ink);font-weight:500;"></span>
            <a href="/profile">Profile</a>
            <a href="/matches">Browse</a>
            <a href="/messages">Messages <span id="navUnreadBadge" class="nav-badge hidden"></span></a>
            <a href="/admin" id="adminLink" class="hidden" style="color:var(--accent);">Admin</a>
            <a href="#" onclick="logout()">Logout</a>
        </div>
        <button class="hamburger" id="hamburger" onclick="toggleNav()" aria-label="Menu">
            <span></span><span></span><span></span>
        </button>
    </nav>

    <div class="page-container">
        <!-- Greeting -->
        <div class="dash-greeting">
            <div>
                <h2 id="greetingText">Dashboard</h2>
                <p class="subtitle" style="margin-bottom:0;">Track who's interested in you, and who you've reached out to.</p>
            </div>
            <a href="/matches" class="btn-primary">Browse Matches →</a>
        </div>

        <!-- Quick stats -->
        <div class="dash-quick-stats" id="quickStats">
            <div class="quick-stat">
                <div class="quick-stat-num" id="statPending">—</div>
                <div class="quick-stat-label">Pending</div>
            </div>
            <div class="quick-stat">
                <div class="quick-stat-num" id="statSent">—</div>
                <div class="quick-stat-label">Sent</div>
            </div>
            <div class="quick-stat">
                <div class="quick-stat-num" id="statAccepted">—</div>
                <div class="quick-stat-label">Accepted</div>
            </div>
        </div>

        <div class="dashboard-grid">
            <div class="dash-section">
                <h3>Incoming Requests</h3>
                <div id="receivedList"></div>
            </div>
            <div class="dash-section">
                <h3>Sent Requests</h3>
                <div id="sentList"></div>
            </div>
            <div class="dash-section full-width">
                <h3>✅ Accepted Matches</h3>
                <div id="acceptedList"></div>
            </div>
        </div>
    </div>

    <!-- Compatibility Modal -->
    <div id="compatModal" class="modal-overlay hidden" onclick="closeModalOnOverlay(event)">
        <div class="modal" role="dialog" aria-modal="true">
            <div class="modal-header">
                <div>
                    <p class="modal-title" id="modalName"></p>
                    <p class="modal-subtitle" id="modalSubtitle"></p>
                </div>
                <button class="modal-close" onclick="closeModal()" aria-label="Close">✕</button>
            </div>
            <div class="modal-body">
                <div class="modal-score-row">
                    <div class="modal-score-big" id="modalScoreBig"></div>
                    <div class="modal-score-meta">
                        <span id="modalQualityBadge"></span>
                        <span style="font-size:12px;color:var(--ink-dim);">compatibility score</span>
                    </div>
                </div>
                <div class="why-matched" id="modalWhyMatched"></div>
                <div class="modal-breakdown-title">Factor Breakdown</div>
                <div class="breakdown-rows" id="modalBreakdownRows"></div>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/login';

        // Greeting
        const name = localStorage.getItem('userName') || '';
        document.getElementById('userName').textContent = name;
        const hour = new Date().getHours();
        const greet = hour < 12 ? 'Good morning' : hour < 17 ? 'Good afternoon' : 'Good evening';
        document.getElementById('greetingText').textContent = greet + ', ' + name.split(' ')[0] + '.';
        checkAdminRole();

        const myId = parseInt(localStorage.getItem('userId'));

        function toggleNav() {
            document.getElementById('navLinks').classList.toggle('nav-open');
            document.getElementById('hamburger').classList.toggle('open');
        }

        async function get(url) {
            const res = await fetch(url, { headers: { 'Authorization': 'Bearer ' + token } });
            return res.json();
        }

        async function loadDashboard() {
            const [received, sent, accepted] = await Promise.all([
                get('/api/matches/received'),
                get('/api/matches/sent'),
                get('/api/matches/accepted')
            ]);

            // Quick stats
            const pending = received.filter(r => r.status === 'PENDING').length;
            document.getElementById('statPending').textContent = pending;
            document.getElementById('statSent').textContent = sent.filter(r => r.status === 'PENDING').length;
            document.getElementById('statAccepted').textContent = accepted.length;
            if (pending > 0) document.getElementById('statPending').style.color = 'var(--warn)';

            renderReceived(received);
            renderSent(sent);
            renderAccepted(accepted);
        }

        function renderReceived(list) {
            const el = document.getElementById('receivedList');
            if (!list.length) { el.innerHTML = '<p class="empty">No requests yet.</p>'; return; }
            el.innerHTML = list.map(r => `
                <div class="request-card">
                    <div class="request-info">
                        <strong>${r.senderName}</strong>
                        <span class="score-pill">${r.compatibilityScore}% match</span>
                        <span class="status-pill status-${r.status.toLowerCase()}">${r.status}</span>
                    </div>
                    ${r.status === 'PENDING' ? `
                    <div class="request-actions">
                        <button class="btn-success" onclick="respond(${r.id}, true)">Accept</button>
                        <button class="btn-danger" onclick="respond(${r.id}, false)">Decline</button>
                    </div>` : ''}
                </div>
            `).join('');
        }

        function renderSent(list) {
            const el = document.getElementById('sentList');
            if (!list.length) { el.innerHTML = '<p class="empty">No requests sent yet.</p>'; return; }
            el.innerHTML = list.map(r => `
                <div class="request-card">
                    <div class="request-info">
                        <strong>${r.receiverName}</strong>
                        <span class="score-pill">${r.compatibilityScore}% match</span>
                        <span class="status-pill status-${r.status.toLowerCase()}">${r.status}</span>
                    </div>
                    ${r.status === 'PENDING' ? `
                    <div class="request-actions">
                        <button class="btn-withdraw" onclick="withdrawRequest(${r.id})">Withdraw</button>
                    </div>` : ''}
                </div>
            `).join('');
        }

        async function renderAccepted(list) {
            const el = document.getElementById('acceptedList');
            if (!list.length) {
                el.innerHTML = '<p class="empty">No accepted matches yet. <a href="/matches" style="color:var(--accent)">Browse and send requests!</a></p>';
                return;
            }
            const cards = await Promise.all(list.map(async r => {
                const other = r.senderId === myId
                    ? { id: r.receiverId, name: r.receiverName, email: r.receiverEmail }
                    : { id: r.senderId,   name: r.senderName,   email: r.senderEmail  };
                let profileData = null;
                try {
                    const res = await fetch('/api/profiles/' + other.id, { headers: { 'Authorization': 'Bearer ' + token } });
                    if (res.ok) profileData = await res.json();
                } catch (_) {}
                return { r, other, profileData };
            }));

            el.innerHTML = cards.map(({ r, other, profileData }) => {
                const hasBreakdown = profileData && profileData.breakdown && profileData.breakdown.length > 0;
                const pdJSON = hasBreakdown ? JSON.stringify(profileData).replace(/'/g, '&#39;') : null;
                return `
                <div class="request-card accepted">
                    <div class="request-info">
                        <strong>${other.name}</strong>
                        <a href="mailto:${other.email}" style="color:var(--accent);font-size:13px;">${other.email}</a>
                        <span class="score-pill">${r.compatibilityScore}% match</span>
                        ${profileData && profileData.matchQuality
                            ? `<span class="quality-badge ${qualityCSSClass(profileData.matchQuality)}">${profileData.matchQuality}</span>`
                            : ''}
                    </div>
                    <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
                        ${hasBreakdown ? `<button class="btn-ghost btn-sm" onclick='openModal(${pdJSON})'>Why matched?</button>` : ''}
                        <a href="/chat?match=${r.id}" class="btn-primary btn-sm">💬 Chat</a>
                    </div>
                </div>`;
            }).join('');
        }

        function openModal(p) {
            document.getElementById('modalName').textContent = p.userName;
            document.getElementById('modalSubtitle').textContent =
                (p.city || '') + (p.preferredArea ? ' · ' + p.preferredArea : '') +
                (p.occupation ? '  ·  ' + p.occupation : '');
            const scoreBig = document.getElementById('modalScoreBig');
            scoreBig.textContent = p.compatibilityScore + '%';
            scoreBig.style.color = scoreColor(p.compatibilityScore);
            const qBadge = document.getElementById('modalQualityBadge');
            qBadge.className = 'quality-badge ' + qualityCSSClass(p.matchQuality);
            qBadge.textContent = p.matchQuality || '';
            const whyEl = document.getElementById('modalWhyMatched');
            if (p.whyMatched && p.whyMatched.length) {
                whyEl.innerHTML = '<div class="why-matched-title">Why you matched</div>' +
                    p.whyMatched.map(s => {
                        const icon = s.startsWith('✓') ? '✓' : s.startsWith('⚠') ? '⚠' : '✗';
                        const cls  = icon === '✓' ? 'match' : icon === '⚠' ? 'partial' : 'mismatch';
                        return `<div class="why-item"><span class="why-icon bd-${cls}">${icon}</span><span class="why-text-${cls}">${s.slice(2)}</span></div>`;
                    }).join('');
                whyEl.classList.remove('hidden');
            } else { whyEl.classList.add('hidden'); }
            const rowsEl = document.getElementById('modalBreakdownRows');
            if (p.breakdown && p.breakdown.length) {
                rowsEl.innerHTML = p.breakdown.map(f => `
                    <div class="breakdown-row">
                        <span class="bd-icon bd-${f.status.toLowerCase()}">${statusIcon(f.status)}</span>
                        <span class="bd-label">${f.label}</span>
                        <span class="bd-bar-wrap"><span class="bd-bar" style="width:${f.max>0?Math.round(f.earned/f.max*100):0}%"></span></span>
                        <span class="bd-pts">${f.earned}/${f.max}</span>
                    </div>
                    <div class="bd-reason">${f.reason}</div>
                `).join('');
            } else { rowsEl.innerHTML = ''; }
            document.getElementById('compatModal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() { document.getElementById('compatModal').classList.add('hidden'); document.body.style.overflow = ''; }
        function closeModalOnOverlay(e) { if (e.target === document.getElementById('compatModal')) closeModal(); }
        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

        async function respond(requestId, accept) {
            const url = `/api/matches/${requestId}/${accept ? 'accept' : 'reject'}`;
            const res = await fetch(url, { method: 'POST', headers: { 'Authorization': 'Bearer ' + token } });
            const data = await res.json();
            alert(data.message);
            loadDashboard();
        }

        async function withdrawRequest(requestId) {
            if (!confirm('Withdraw this match request?')) return;
            try {
                const res = await fetch(`/api/matches/sent/${requestId}`, { method: 'DELETE', headers: { 'Authorization': 'Bearer ' + token } });
                const data = await res.json();
                alert(data.message || data.error || 'Done');
                loadDashboard();
            } catch (e) { alert('Failed to withdraw request'); }
        }

        function checkAdminRole() {
            if (localStorage.getItem('userRole') === 'ADMIN') {
                const link = document.getElementById('adminLink');
                if (link) link.classList.remove('hidden');
            }
        }

        function statusIcon(s) { return s === 'MATCH' ? '✓' : s === 'PARTIAL' ? '⚠' : '✗'; }
        function scoreColor(score) {
            if (score >= 85) return '#34d399';
            if (score >= 70) return '#fbbf24';
            if (score >= 55) return '#fb923c';
            return '#8b95a7';
        }
        function qualityCSSClass(q) {
            if (!q) return '';
            if (q.startsWith('Perfect'))   return 'quality-perfect';
            if (q.startsWith('Excellent')) return 'quality-excellent';
            if (q.startsWith('Good'))      return 'quality-good';
            if (q.startsWith('Fair'))      return 'quality-fair';
            return 'quality-low';
        }

        async function loadUnreadBadge() {
            try {
                const res = await fetch('/api/messages/unread-count', { headers: { 'Authorization': 'Bearer ' + token } });
                const { count } = await res.json();
                const badge = document.getElementById('navUnreadBadge');
                if (count > 0) { badge.textContent = count; badge.classList.remove('hidden'); }
                else { badge.classList.add('hidden'); }
            } catch (_) {}
        }

        function logout() { localStorage.clear(); window.location.href = '/login'; }

        loadDashboard();
        loadUnreadBadge();
        setInterval(loadUnreadBadge, 15000);
    </script>
</body>
</html>
