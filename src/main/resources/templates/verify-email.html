<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Verify Email - RoommateFinder</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <a href="/" class="brand">RoommateFinder</a>
            <h2>Email Verification</h2>
        </div>
        <div id="msg"></div>
    </div>

    <script>
        const token = new URLSearchParams(window.location.search).get('token');
        const el = document.getElementById('msg');

        if (!token) {
            el.className = 'error-msg';
            el.textContent = 'No verification token found.';
        } else {
            fetch('/api/auth/verify?token=' + token)
                .then(r => r.json())
                .then(data => {
                    el.className = 'success-msg';
                    el.textContent = data.message + ' Redirecting to login...';
                    setTimeout(() => window.location.href = '/login', 2000);
                })
                .catch(() => {
                    el.className = 'error-msg';
                    el.textContent = 'Verification failed. Token may be expired.';
                });
        }
    </script>
</body>
</html>
