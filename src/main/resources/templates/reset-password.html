<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset Password - RoommateFinder</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <a href="/" class="brand">RoommateFinder</a>
            <h2>Choose a new password</h2>
        </div>

        <div id="errorMsg" class="error-msg hidden"></div>
        <div id="successMsg" class="success-msg hidden"></div>
        <div id="invalidMsg" class="error-msg hidden">
            This reset link is invalid or has expired. <a href="/forgot-password">Request a new one</a>.
        </div>

        <form id="resetForm">
            <div class="form-group">
                <label>New password</label>
                <input type="password" id="password" placeholder="At least 6 characters" required minlength="6" />
            </div>
            <div class="form-group">
                <label>Confirm password</label>
                <input type="password" id="confirm" placeholder="Repeat password" required minlength="6" />
            </div>
            <button type="submit" class="btn-primary btn-full">Reset password</button>
        </form>

        <p class="auth-switch"><a href="/login">← Back to login</a></p>
    </div>

    <script>
        // Extract token from query string
        const params = new URLSearchParams(window.location.search);
        const resetToken = params.get('token');

        if (!resetToken) {
            document.getElementById('resetForm').classList.add('hidden');
            document.getElementById('invalidMsg').classList.remove('hidden');
        }

        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm').value;

            if (password !== confirm) {
                const el = document.getElementById('errorMsg');
                el.textContent = 'Passwords do not match.';
                el.classList.remove('hidden');
                return;
            }

            try {
                const res = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: resetToken, password })
                });
                const data = await res.json();

                if (!res.ok) throw new Error(data.message || 'Reset failed');

                document.getElementById('resetForm').classList.add('hidden');
                const el = document.getElementById('successMsg');
                el.textContent = data.message;
                el.classList.remove('hidden');
                setTimeout(() => window.location.href = '/login', 2000);
            } catch (err) {
                const el = document.getElementById('errorMsg');
                el.textContent = err.message;
                el.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
