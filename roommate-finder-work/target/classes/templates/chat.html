<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chat - RoommateFinder</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body style="overflow:hidden;">
    <nav class="navbar">
        <a href="/dashboard" class="nav-brand">Roommate<span class="accent-dot">Finder</span></a>
        <div class="nav-links">
            <a href="/matches">Browse</a>
            <a href="/messages">Messages</a>
            <a href="/dashboard">Dashboard</a>
            <a href="#" onclick="logout()">Logout</a>
        </div>
    </nav>

    <div class="chat-page">
        <!-- Header -->
        <div class="chat-header">
            <a href="/messages" class="chat-back">← Back</a>
            <div id="chatAvatar" class="inbox-avatar" style="width:44px;height:44px;font-size:16px;"></div>
            <div class="chat-header-info">
                <h2 class="chat-header-name" id="chatPartnerName">Loading…</h2>
                <div class="chat-header-meta" id="chatPartnerMeta"></div>
            </div>
        </div>

        <!-- Message area -->
        <div class="chat-messages" id="chatMessages">
            <div class="chat-empty">
                <div class="chat-empty-icon">💬</div>
                <p>Loading messages…</p>
            </div>
        </div>

        <!-- Input bar -->
        <div class="chat-input-bar">
            <textarea
                id="msgInput"
                class="chat-input"
                placeholder="Type a message…"
                rows="1"
                maxlength="2000"
                oninput="autoResize(this); toggleSendBtn()"
                onkeydown="handleEnter(event)"></textarea>
            <button id="sendBtn" class="chat-send-btn" onclick="sendMessage()" disabled>
                ➤
            </button>
        </div>
    </div>

    <script>
        const token  = localStorage.getItem('token');
        const myId   = parseInt(localStorage.getItem('userId'));
        if (!token)  window.location.href = '/login';

        const params       = new URLSearchParams(window.location.search);
        const matchId      = parseInt(params.get('match'));
        if (!matchId) window.location.href = '/messages';

        let pollTimer      = null;
        let lastMsgCount   = 0;
        let partnerName    = '';

        // ── Init ──────────────────────────────────────────────────────────
        async function init() {
            // Load conversation metadata from inbox list
            try {
                const res = await fetch('/api/messages/conversations', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const convos = await res.json();
                const convo  = convos.find(c => c.matchRequestId === matchId);
                if (convo) {
                    partnerName = convo.otherUserName;
                    document.getElementById('chatPartnerName').textContent = convo.otherUserName;
                    document.getElementById('chatPartnerMeta').textContent =
                        convo.compatibilityScore + '% match · ' + convo.matchQuality;

                    const avatarEl = document.getElementById('chatAvatar');
                    if (convo.otherUserPicture) {
                        avatarEl.innerHTML = `<img src="${convo.otherUserPicture}" alt="${convo.otherUserName}" />`;
                    } else {
                        avatarEl.textContent = convo.otherUserName.charAt(0).toUpperCase();
                    }
                }
            } catch (_) {}

            await loadMessages();
            startPolling();
        }

        // ── Load / refresh messages ───────────────────────────────────────
        async function loadMessages(scrollToBottom = true) {
            try {
                const res  = await fetch(`/api/messages/conversation/${matchId}`, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const msgs = await res.json();

                if (msgs.length !== lastMsgCount) {
                    lastMsgCount = msgs.length;
                    renderMessages(msgs);
                    if (scrollToBottom) scrollDown();
                }
            } catch (_) {}
        }

        function renderMessages(msgs) {
            const container = document.getElementById('chatMessages');

            if (!msgs.length) {
                container.innerHTML = `
                    <div class="chat-empty">
                        <div class="chat-empty-icon">👋</div>
                        <p>Start the conversation</p>
                        <p style="font-size:12px;color:var(--ink-dim);margin:0;">
                            Say hi to ${escHtml(partnerName || 'your match')}!
                        </p>
                    </div>`;
                return;
            }

            let html = '';
            let lastDate = '';

            msgs.forEach(msg => {
                const sent = msg.senderId === myId;
                const date = formatDate(msg.timestamp);

                if (date !== lastDate) {
                    html += `<div class="chat-date-sep">${date}</div>`;
                    lastDate = date;
                }

                html += `
                <div class="msg-row ${sent ? 'sent' : 'received'}">
                    <div class="msg-bubble">${escHtml(msg.content)}</div>
                    <div class="msg-time">${formatTime(msg.timestamp)}</div>
                </div>`;
            });

            container.innerHTML = html;
        }

        // ── Send message ──────────────────────────────────────────────────
        async function sendMessage() {
            const input = document.getElementById('msgInput');
            const content = input.value.trim();
            if (!content) return;

            input.value = '';
            autoResize(input);
            toggleSendBtn();

            try {
                await fetch(`/api/messages/conversation/${matchId}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify({ content })
                });
                await loadMessages(true);
            } catch (e) {
                input.value = content; // restore on failure
                toggleSendBtn();
            }
        }

        // ── Polling (every 4 seconds) ─────────────────────────────────────
        function startPolling() {
            pollTimer = setInterval(() => loadMessages(true), 4000);
        }

        window.addEventListener('beforeunload', () => clearInterval(pollTimer));

        // ── UI helpers ────────────────────────────────────────────────────
        function handleEnter(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function toggleSendBtn() {
            const val = document.getElementById('msgInput').value.trim();
            document.getElementById('sendBtn').disabled = !val;
        }

        function autoResize(el) {
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 120) + 'px';
        }

        function scrollDown() {
            const el = document.getElementById('chatMessages');
            el.scrollTop = el.scrollHeight;
        }

        function formatTime(iso) {
            if (!iso) return '';
            const d = new Date(iso);
            return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        function formatDate(iso) {
            if (!iso) return '';
            const d    = new Date(iso);
            const today = new Date();
            const yesterday = new Date(today); yesterday.setDate(today.getDate() - 1);
            if (d.toDateString() === today.toDateString())     return 'Today';
            if (d.toDateString() === yesterday.toDateString()) return 'Yesterday';
            return d.toLocaleDateString([], { month: 'short', day: 'numeric' });
        }

        function escHtml(s) {
            if (!s) return '';
            return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
                    .replace(/\n/g,'<br>');
        }

        function logout() { localStorage.clear(); window.location.href = '/login'; }

        init();
    </script>
</body>
</html>
