<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register - RoommateFinder</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <a href="/" class="brand">RoommateFinder</a>
            <h2>Create your account</h2>
        </div>

        <div id="errorMsg" class="error-msg hidden"></div>
        <div id="successMsg" class="success-msg hidden"></div>

        <form id="registerForm">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="name" placeholder="Anushka Dixit" required />
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="you@example.com" required />
            </div>
            <div class="form-group">
                <label>Phone (optional)</label>
                <input type="tel" id="phone" placeholder="+91 98765 43210" />
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Min 6 characters" required minlength="6" />
            </div>
            <button type="submit" class="btn-primary btn-full">Create Account</button>
        </form>

        <p class="auth-switch">Already have an account? <a href="/login">Login</a></p>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const body = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                password: document.getElementById('password').value,
            };

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });

                const data = await res.json();
                if (!res.ok) throw new Error(data.message || 'Registration failed');

                document.getElementById('registerForm').classList.add('hidden');
                const el = document.getElementById('successMsg');
                el.textContent = data.message;
                el.classList.remove('hidden');
            } catch (err) {
                const el = document.getElementById('errorMsg');
                el.textContent = err.message;
                el.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
