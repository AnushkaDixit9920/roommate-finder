<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password - RoommateFinder</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <a href="/" class="brand">RoommateFinder</a>
            <h2>Reset password</h2>
        </div>

        <div id="errorMsg" class="error-msg hidden"></div>
        <div id="successMsg" class="success-msg hidden"></div>

        <form id="forgotForm">
            <div class="form-group">
                <label>Email address</label>
                <input type="email" id="email" placeholder="you@example.com" required />
            </div>
            <button type="submit" class="btn-primary btn-full">Send reset link</button>
        </form>

        <p class="auth-switch"><a href="/login">← Back to login</a></p>
    </div>

    <script>
        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;

            try {
                const res = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await res.json();

                // Always show success (server gives generic message to prevent enumeration)
                document.getElementById('forgotForm').classList.add('hidden');
                const el = document.getElementById('successMsg');
                el.textContent = data.message;
                el.classList.remove('hidden');
            } catch (err) {
                const el = document.getElementById('errorMsg');
                el.textContent = 'Something went wrong. Please try again.';
                el.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
