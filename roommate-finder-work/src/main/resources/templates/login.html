<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - RoommateFinder</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <a href="/" class="brand">RoommateFinder</a>
            <h2>Welcome back</h2>
        </div>

        <div id="errorMsg" class="error-msg hidden"></div>

        <form id="loginForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="you@example.com" required />
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required />
            </div>
            <button type="submit" class="btn-primary btn-full">Sign in</button>
        </form>

        <!-- Forgot password link -->
        <p style="text-align:center; margin-top:14px; font-size:13px;">
            <a href="/forgot-password" style="color:var(--ink-dim);">Forgot password?</a>
        </p>

        <p class="auth-switch">Don't have an account? <a href="/register">Register</a></p>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();
                if (!res.ok) throw new Error(data.message || 'Login failed');

                localStorage.setItem('token', data.token);
                localStorage.setItem('userId', data.userId);
                localStorage.setItem('userName', data.name);
                localStorage.setItem('userRole', data.role || 'USER');

                window.location.href = data.hasProfile ? '/dashboard' : '/profile';
            } catch (err) {
                const el = document.getElementById('errorMsg');
                el.textContent = err.message;
                el.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
